<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lugares pelo Brasil" />
    <meta name="author" content="Hugo Cunha" />
    <meta name="keywords" content="HTML, CSS, JavaScript" />
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="shortcut icon" href="./brazil-favicon.png" type="image/x-icon" />
    <title>BR Afora</title>
  </head>

  <body>
    <div class="page">
      <!-- Header -->
      <header class="header">
        <h1 class="header__title">
          Around <span class="header__title-small">The Brazil</span>
        </h1>
      </header>

      <main class="content">
        <!-- Profile -->
        <section class="profile">
          <!-- profile container -->
          <div class="profile__content">
            <img
              class="profile__avatar"
              src="./images/avatar-hugo.png"
              alt="Imagem de uma pessoa"
            />
            <div class="profile__info">
              <h2 class="profile__name">Hugo Cunha</h2>
              <p class="profile__description">Explorador</p>
            </div>
            <button
              class="profile__button profile__button_type_edit"
              type="button"
              id="edit-button"
            >
              <img
                class="profile__icon profile__icon_type_edit"
                src="./images/profile-edit-button.svg"
                alt="Editar perfil"
              />
            </button>
          </div>

          <button
            class="profile__button profile__button_type_add"
            type="button"
            id="add-button"
          >
            <img
              class="profile__icon profile__icon_type_add"
              src="./images/profile-add-button.svg"
              alt="Adicionar novo lugar"
            />
          </button>
        </section>
        <!-- Elementes -->
        <section class="elements">
          <div class="elements__cards">
            <template class="elements__template">
              <div class="elements__card">
                <button class="elements__image-button">
                  <img class="elements__image" src="" alt="Imagem do lugar" />
                </button>

                <button
                  class="elements__button elements__button_type_trash"
                  type="button"
                >
                  <img
                    class="elements__icon elements__icon_type_trash-cap"
                    src="./images/trashcap.svg"
                    alt="Excluir"
                  />
                  <img
                    class="elements__icon elements__icon_type_trash-can"
                    src="./images/trashcan.svg"
                    alt="Excluir"
                  />
                </button>

                <div class="elements__title">
                  <h3 class="elements__text"></h3>
                  <button
                    class="elements__button elements__button_type_like"
                    type="button"
                  >
                    <img src="./images/like.svg" alt="Curtir" />
                  </button>
                </div>
              </div>
            </template>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p class="footer__copyright">
          &copy; 2025 Around The Brazil / Hugo L. S. da Cunha
        </p>
      </footer>

      <div class="popup" id="profile">
        <div class="popup__container">
          <button class="popup__button popup__button_type_close" type="button">
            <img
              class="popup__icon"
              src="./images/popup-close-icon.svg"
              alt="Fechar"
            />
          </button>
          <h2 class="popup__title">Editar Perfil</h2>
          <form class="popup__form">
            <fieldset class="popup__name" name="edit-profile">
              <input
                class="popup__item popup__item_type_name"
                type="text"
                name="name"
                placeholder="Nome"
                minlength="2"
                maxlength="40"
                required
              />
              <span class="popup__error popup__error_type_name"></span>
              <input
                class="popup__item popup__item_type_about"
                type="text"
                name="about"
                placeholder="Sobre mim"
                minlength="2"
                maxlength="200"
                required
              />
              <span class="popup__error popup__error_type_about"></span>
              <button
                class="popup__button popup__button_type_send"
                type="submit"
                disabled
              >
                Guardar
              </button>
            </fieldset>
          </form>
        </div>
      </div>

      <div class="popup" id="add-popup">
        <div class="popup__container">
          <button
            class="popup__button popup__button_type_close"
            type="button"
            id="close-add-popup"
          >
            <img
              class="popup__icon"
              src="./images/popup-close-icon.svg"
              alt="Fechar"
            />
          </button>
          <h2 class="popup__title">Novo Lugar</h2>
          <form class="popup__form" id="add-form">
            <fieldset class="popup__name" name="new-place">
              <input
                class="popup__item popup__item_type_name"
                id="place-input"
                type="text"
                name="place"
                placeholder="Título"
                minlength="2"
                maxlength="30"
                required
              />
              <span class="popup__error popup__error_type_place"></span>
              <input
                class="popup__item popup__item_type_link"
                id="link-input"
                type="url"
                name="link"
                placeholder="Link da imagem"
                required
              />
              <span class="popup__error popup__error_type_link"></span>
              <button
                class="popup__button popup__button_type_send"
                id="add-card-button"
                type="submit"
                disabled
              >
                Guardar
              </button>
            </fieldset>
          </form>
        </div>
      </div>
      <!-- Popup Image -->
      <div class="popup popup_type_image">
        <div class="popup__container popup__container_type_image">
          <button
            class="popup__button popup__button_type_close"
            type="button"
          > <img src="./images/close.svg" alt="close button"></button>
          <img class="popup__image" src="" alt="" />
          <p class="popup__caption"></p>
        </div>
      </div>
    </div>
    <script type="module" src="./scripts/index.js"></script>
  </body>
</html>
